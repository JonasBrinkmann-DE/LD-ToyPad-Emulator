<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Toy Pad Emulator for Lego Dimensions</title>
    <link rel="stylesheet" href="stylesheets/main.css" />
    <script src="jQuery/jquery-3.7.1.min.js"></script>
    <script src="jQuery/jquery-ui.min.js"></script>
    <script src="jQuery/jquery.ui.touch-punch.min.js"></script>
    <script src="jQuery/jquery.color-3.0.0.min.js"></script>

    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts/main.js" defer></script>
  </head>

  <body>
    <div id="tag-creation-popup" class="overlay"></div>
    <main id="main">
      <h1 id="header">Toy Pad Emulator for Lego Dimensions</h1>
      <p id="warnings" class="container">
        Create characters and vehicles with the boxes at the top, then drag them
        to the Toy Pad.
        <br />
        <b
          >If you encounter a token that is not responding, move it to the toy
          box and then back to the Toy Pad.</b
        >
        <br />
        <button id="sync" type="button">
          Things Not Working? Click Here To Sync!
        </button>
      </p>
      <div id="toypad-column" class="layout-column">
        <div id="toypad">
          <div id="connectionHintPanel">
            I haven't communicated with the game yet!
          </div>
          <div>
            <div class="drop-targets">
              <div
                id="toypad1"
                class="box"
                padnum="2"
                padindex="1"
                color="white"
              ></div>
              <div class="box" invisible></div>
              <div
                id="toypad2"
                class="box"
                padnum="1"
                padindex="2"
                color="white"
              ></div>
              <div class="box" invisible></div>
              <div
                id="toypad3"
                class="box"
                padnum="3"
                padindex="3"
                color="white"
              ></div>
            </div>
            <div class="drop-targets">
              <div
                id="toypad4"
                class="box"
                padnum="2"
                padindex="4"
                color="white"
              ></div>
              <div
                id="toypad5"
                class="box"
                padnum="2"
                padindex="5"
                color="white"
              ></div>
              <div class="box" invisible></div>
              <div
                id="toypad6"
                class="box"
                padnum="3"
                padindex="6"
                color="white"
              ></div>
              <div
                id="toypad7"
                class="box"
                padnum="3"
                padindex="7"
                color="white"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <br />
      <div id="layout-controller">
        <div id="toybox-column" class="flex-container layout-column">
          <div id="token-box" class="flex-container">
            <div
              class="delete-token drag-disabled"
              id="delete-token-left"
              hidden
            >
              <img src="svgs/trash.svg" />
            </div>
            <div
              class="drag-disabled delete-token"
              id="delete-token-right"
              hidden
            >
              <img src="svgs/trash.svg" />
            </div>
            <ul id="toybox-tokens" class="box" padnum="-1"></ul>
          </div>
          <div class="vl"></div>
          <div class="wrapper">
            <form id="filter-container" onsubmit="return filterSubmit(event)">
              <input
                type="text"
                name="search-bar"
                id="search-bar"
                placeholder="Search"
              />
              <select name="active-filter" id="active-filter">
                <option value="Name">Name</option>
                <option value="World">World</option>
                <option value="Ability">Ability</option>
              </select>
            </form>
            <div id="action-container">
              <button id="add-btn" type="button">
                <img src="svgs/plus.svg" alt="+" width="12px" />
              </button>
            </div>
          </div>
        </div>
      </div>
      <div id="tag-creation-container">
        <form id="character-select" class="container" hidden>
          <label>
            <input
              list="character-list"
              id="character-name"
              onfocus="this.value=''"
              onchange="this.blur();"
              placeholder="Select a character"
            />
            <datalist id="character-list"></datalist>
          </label>
          <br />
          <button type="submit">Create Character</button>
        </form>

        <form id="vehicle-select" class="container" hidden>
          <label>
            <input
              list="vehicle-list"
              id="vehicle-name"
              onfocus="this.value=''"
              onchange="this.blur();"
              placeholder="Select a vehicle"
            />
            <datalist id="vehicle-list"></datalist>
          </label>
          <br />
          <button type="submit">Create Vehicle</button>
        </form>
      </div>
    </main>
    <footer>
      <button onclick="openLicence();" id="licence-button" type="button">
        <img src="svgs/copyright.svg" alt="©" width="18px" />
      </button>
      <button onclick="openGithub();" id="github-button" type="button">
        <img src="svgs/github.svg" alt="Github" width="25px" />
      </button>
    </footer>
  </body>
</html>
